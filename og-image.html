<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>AI CARDS OG Image</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #080808;
      font-family: Georgia, 'Times New Roman', serif;
      position: relative;
    }

    /* Radial vignette */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 40%, #1a0a0a 0%, #080808 100%);
    }

    /* Scanlines */
    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Noise / grain texture via SVG filter */
    .grain {
      position: absolute;
      inset: 0;
      z-index: 9;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Content wrapper */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      z-index: 5;
    }

    /* Top decorative line */
    .rule-top {
      width: 900px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #cc1111 20%, #cc1111 80%, transparent);
      margin-top: 44px;
      opacity: 0.7;
    }

    /* Corner ornaments */
    .corner {
      position: absolute;
      width: 48px;
      height: 48px;
      border-color: #cc1111;
      border-style: solid;
      opacity: 0.5;
      z-index: 6;
    }
    .corner-tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

    /* AI CARDS title */
    .title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 112px;
      font-weight: 700;
      color: #cc1111;
      letter-spacing: 0.12em;
      text-align: center;
      margin-top: 20px;
      line-height: 1;
      text-shadow:
        0 0 20px rgba(204, 17, 17, 0.8),
        0 0 60px rgba(204, 17, 17, 0.4),
        0 0 120px rgba(204, 17, 17, 0.2),
        2px 2px 0px #3a0000;
    }

    /* Subtitle */
    .subtitle {
      font-family: 'Courier New', Courier, monospace;
      font-size: 20px;
      font-weight: 400;
      color: #aaa;
      letter-spacing: 0.35em;
      text-align: center;
      margin-top: 10px;
      text-transform: uppercase;
    }

    /* Thin red rule below subtitle */
    .rule-mid {
      width: 600px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #cc111177 20%, #cc111177 80%, transparent);
      margin-top: 14px;
    }

    /* Card fan container */
    .card-fan {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 260px;
    }

    /* Individual card back */
    .card {
      position: absolute;
      width: 130px;
      height: 190px;
      border-radius: 10px;
      bottom: 0;
      transform-origin: bottom center;
      overflow: hidden;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      border-radius: 10px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e0e;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Card back pattern */
    .card-inner::before {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .card-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 1px,
          transparent 1px,
          transparent 6px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 1px,
          transparent 1px,
          transparent 6px
        );
    }

    .card-symbol {
      font-size: 28px;
      z-index: 2;
      position: relative;
      opacity: 0.5;
      text-align: center;
      line-height: 1;
    }

    /* Prismatic — Mythic */
    .card-0 {
      left: 20px;
      transform: rotate(-28deg) translateY(30px);
      box-shadow:
        0 0 24px rgba(255, 255, 255, 0.5),
        0 0 60px rgba(200, 100, 255, 0.3),
        0 8px 32px rgba(0,0,0,0.7);
    }
    .card-0 .card-inner { background: conic-gradient(from 45deg, #1a0a18, #0a101a, #0a1a0a, #1a1a0a, #1a0a0a, #1a0a18); border-color: rgba(255,255,255,0.3); }
    .card-0 .card-symbol { color: #ffffff; text-shadow: 0 0 12px rgba(255,255,255,0.8); }

    /* Gold — Legendary */
    .card-1 {
      left: 120px;
      transform: rotate(-17deg) translateY(14px);
      box-shadow:
        0 0 18px rgba(212, 175, 55, 0.55),
        0 0 50px rgba(212, 175, 55, 0.25),
        0 8px 32px rgba(0,0,0,0.7);
    }
    .card-1 .card-inner { background: linear-gradient(160deg, #1a1500, #0e0c00); border-color: rgba(212,175,55,0.3); }
    .card-1 .card-symbol { color: #d4af37; }

    /* Purple — Rare */
    .card-2 {
      left: 215px;
      transform: rotate(-7deg) translateY(4px);
      box-shadow:
        0 0 16px rgba(148, 0, 211, 0.55),
        0 0 45px rgba(148, 0, 211, 0.25),
        0 8px 32px rgba(0,0,0,0.7);
    }
    .card-2 .card-inner { background: linear-gradient(160deg, #110018, #0a0010); border-color: rgba(148,0,211,0.3); }
    .card-2 .card-symbol { color: #9400d3; }

    /* Blue — Uncommon */
    .card-3 {
      left: 310px;
      transform: rotate(3deg) translateY(0px);
      box-shadow:
        0 0 16px rgba(30, 100, 220, 0.55),
        0 0 45px rgba(30, 100, 220, 0.25),
        0 8px 32px rgba(0,0,0,0.7);
    }
    .card-3 .card-inner { background: linear-gradient(160deg, #001022, #000810); border-color: rgba(30,100,220,0.3); }
    .card-3 .card-symbol { color: #1e64dc; }

    /* Pink — Common */
    .card-4 {
      left: 405px;
      transform: rotate(13deg) translateY(8px);
      box-shadow:
        0 0 16px rgba(220, 80, 160, 0.55),
        0 0 45px rgba(220, 80, 160, 0.25),
        0 8px 32px rgba(0,0,0,0.7);
    }
    .card-4 .card-inner { background: linear-gradient(160deg, #180010, #0e0009); border-color: rgba(220,80,160,0.3); }
    .card-4 .card-symbol { color: #dc50a0; }

    /* Gray — Junk */
    .card-5 {
      left: 500px;
      transform: rotate(25deg) translateY(24px);
      box-shadow:
        0 0 12px rgba(140, 140, 140, 0.4),
        0 0 35px rgba(140, 140, 140, 0.15),
        0 8px 32px rgba(0,0,0,0.7);
    }
    .card-5 .card-inner { background: linear-gradient(160deg, #111111, #080808); border-color: rgba(140,140,140,0.25); }
    .card-5 .card-symbol { color: #8c8c8c; }

    /* Bottom tagline */
    .tagline {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 0.28em;
      color: #555;
      text-transform: uppercase;
      z-index: 6;
    }

    .tagline span {
      color: #cc1111;
      opacity: 0.8;
    }

    /* Red ambient glow behind title area */
    .glow-center {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 300px;
      background: radial-gradient(ellipse at 50% 0%, rgba(204,17,17,0.07) 0%, transparent 70%);
      z-index: 3;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grain"></div>
  <div class="scanlines"></div>
  <div class="glow-center"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="content">
    <div class="rule-top"></div>
    <div class="title">AI CARDS</div>
    <div class="subtitle">2030 Survival Edition</div>
    <div class="rule-mid"></div>
  </div>

  <!-- Card fan -->
  <div class="card-fan">
    <div class="card card-0">
      <div class="card-inner">
        <div class="card-symbol">∞</div>
      </div>
    </div>
    <div class="card card-1">
      <div class="card-inner">
        <div class="card-symbol">✦</div>
      </div>
    </div>
    <div class="card card-2">
      <div class="card-inner">
        <div class="card-symbol">◈</div>
      </div>
    </div>
    <div class="card card-3">
      <div class="card-inner">
        <div class="card-symbol">⬡</div>
      </div>
    </div>
    <div class="card card-4">
      <div class="card-inner">
        <div class="card-symbol">✿</div>
      </div>
    </div>
    <div class="card card-5">
      <div class="card-inner">
        <div class="card-symbol">◆</div>
      </div>
    </div>
  </div>

  <div class="tagline">
    162 Cards <span>·</span> 6 Rarities <span>·</span> 6 Sets <span>·</span> NFTs on Sui <span>·</span> Collect What Survives
  </div>
</body>
</html>
